<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico de Precificação</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
      padding: 24px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.15;
    }

    .sub {
      margin: 0 0 24px;
      color: #4b5563;
      font-size: 16px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 14px 16px;
      font-size: 16px;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #111827;
    }

    button {
      border: none;
      background: #111827;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.96;
    }

    .resultado {
      margin-top: 24px;
      padding: 22px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: none;
    }

    .headline {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0 0 18px;
    }

    .headline.critico {
      color: #991b1b;
    }

    .headline.atencao {
      color: #b45309;
    }

    .headline.saudavel {
      color: #065f46;
    }

    .headline.acima {
      color: #1d4ed8;
    }

    .linha {
      margin: 10px 0;
      font-size: 17px;
      line-height: 1.5;
    }

    .bloco {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid #e5e7eb;
    }

    .bloco-setorial {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .bloco-setorial-titulo {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      color: #374151;
      letter-spacing: 0.3px;
    }

    .fonte {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.55;
    }

    .disclaimer {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }

    .erro {
      margin-top: 14px;
      color: #b91c1c;
      font-weight: 700;
      display: none;
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .badge.critico {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.atencao {
      background: #fef3c7;
      color: #b45309;
    }

    .badge.saudavel {
      background: #dcfce7;
      color: #166534;
    }

    .badge.acima {
      background: #dbeafe;
      color: #1d4ed8;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 20px;
      }

      h1 {
        font-size: 26px;
      }

      .headline {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Descubra se sua margem está abaixo da referência do seu segmento</h1>
      <p class="sub">
        Preencha os dados e veja, em segundos, como sua margem está comparada ao seu segmento.
      </p>

      <div class="grid">
        <div>
          <label for="precoAtual">Preço atual</label>
          <input id="precoAtual" type="text" inputmode="decimal" placeholder="R$ 0,00" />
        </div>

        <div>
          <label for="custoUnitario">Custo por unidade (R$)</label>
          <input id="custoUnitario" type="text" inputmode="decimal" placeholder="R$ 0,00" />
        </div>

        <div>
          <label for="volume">Volume mensal</label>
          <input id="volume" type="text" inputmode="numeric" placeholder="0" />
        </div>

        <div>
          <label for="segmento">Segmento</label>
          <select id="segmento">
            <option value="">Selecione</option>
            <option value="mercado_mercearia">Mercado / Mercearia</option>
            <option value="roupas_moda">Roupas / Moda</option>
            <option value="cosmeticos_acessorios">Cosméticos / Acessórios</option>
            <option value="pet_shop">Pets / Pet shop</option>
            <option value="agencia_consultoria">Agência / Consultoria</option>
            <option value="salao_estetica">Salão de beleza / Estética</option>
            <option value="industria">Indústria</option>
          </select>
        </div>

        <div>
          <button onclick="calcularDiagnostico()">Gerar diagnóstico</button>
        </div>
      </div>

      <div id="erro" class="erro">Preencha todos os campos corretamente.</div>
      <div id="resultado" class="resultado"></div>
    </div>
  </div>

  <script>
    const referencias = {
      mercado_mercearia: {
        nome: "Mercado / Mercearia",
        margem: 0.15,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 15% de margem bruta, alinhado ao topo da faixa de comércio/lojas usada pelo Sebrae.
        `,
        leituraSetorial: `
          Em mercado e mercearia, a operação costuma depender de giro alto, sensibilidade a preço e margem mais apertada. Por isso, pequenos desvios de preço ou custo podem comprometer uma parcela relevante do resultado mensal.
        `,
        atencaoSetorial: `
          O principal risco aqui é operar com muito volume e pouca sobra financeira. Quando a margem unitária fica comprimida demais, o negócio vende, gira, mas captura menos resultado do que poderia.
        `
      },
      roupas_moda: {
        nome: "Roupas / Moda",
        margem: 0.50,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 50% de margem bruta, coerente com a dinâmica típica de varejo de moda e posicionamento do setor.
        `,
        leituraSetorial: `
          Em moda, a margem costuma ser mais alta porque o preço não depende só do custo da peça, mas também de posicionamento, marca, coleção, percepção de valor e risco comercial do estoque.
        `,
        atencaoSetorial: `
          Um ponto crítico do setor é o risco de ficar com estoque parado, coleção antiga ou peças sem demanda. Essa exposição normalmente exige uma margem mais robusta nas vendas que giram bem, para compensar remarcações, liquidações e capital empatado em produtos que podem perder força comercial.
        `
      },
      cosmeticos_acessorios: {
        nome: "Cosméticos / Acessórios",
        margem: 0.35,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 35% de margem bruta, como premissa conservadora para uma categoria com potencial de markup superior ao comércio tradicional.
        `,
        leituraSetorial: `
          Em cosméticos e acessórios, a margem costuma ser mais influenciada por valor percebido, marca, apresentação e posicionamento do que apenas por custo direto. Isso normalmente abre mais espaço de captura de margem do que no varejo tradicional.
        `,
        atencaoSetorial: `
          O risco aqui é competir apenas por preço em uma categoria em que branding, experiência e percepção podem sustentar uma margem melhor. Quando isso acontece, o negócio pode vender, mas monetizar menos do que a categoria permite.
        `
      },
      pet_shop: {
        nome: "Pets / Pet shop",
        margem: 0.20,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 20% de margem bruta, como premissa intermediária para um segmento que combina venda de produtos e serviços.
        `,
        leituraSetorial: `
          No segmento pet, a operação costuma combinar produtos, serviços e recorrência. Isso tende a abrir espaço para uma margem mais equilibrada quando o preço está bem posicionado e o cliente percebe conveniência, confiança e continuidade no atendimento.
        `,
        atencaoSetorial: `
          O ponto de atenção é tratar todo o negócio como se tivesse a mesma lógica de margem. Em pet, produtos e serviços costumam ter comportamentos diferentes, e isso pode esconder oportunidade de captura melhor de resultado.
        `
      },
      agencia_consultoria: {
        nome: "Agência / Consultoria",
        margem: 0.30,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços intelectuais e de maior valor agregado.
        `,
        leituraSetorial: `
          Em agência e consultoria, o preço tende a refletir menos custo direto e mais especialização, confiança, repertório e valor percebido pelo cliente. Por isso, a qualidade da entrega e o posicionamento influenciam fortemente a margem possível.
        `,
        atencaoSetorial: `
          O risco mais comum é precificar só com base em horas, esforço ou custo interno, sem capturar adequadamente o valor gerado para o cliente. Isso pode limitar margem mesmo em operações com boa entrega.
        `
      },
      salao_estetica: {
        nome: "Salão de beleza / Estética",
        margem: 0.30,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços de beleza e estética.
        `,
        leituraSetorial: `
          Em beleza e estética, a margem depende fortemente de percepção de qualidade, experiência entregue, recorrência e capacidade de fidelização. O preço costuma carregar mais do que o custo do procedimento em si.
        `,
        atencaoSetorial: `
          O principal risco é manter preços pressionados em um negócio que depende de agenda, experiência e relacionamento. Isso pode gerar ocupação, mas com captura limitada de valor por atendimento.
        `
      },
      industria: {
        nome: "Indústria",
        margem: 0.10,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 10% de margem bruta, em leitura conservadora para o produto.
        `,
        leituraSetorial: `
          Em indústria, pequenas variações de margem por unidade podem ganhar grande relevância quando aplicadas em escala. Por isso, mesmo diferenças aparentemente pequenas de preço ou custo podem gerar impacto relevante no resultado total.
        `,
        atencaoSetorial: `
          O risco aqui é normalizar margens comprimidas por hábito operacional. Em negócios industriais, disciplina de margem é importante porque qualquer desvio tende a ser amplificado pelo volume.
        `
      }
    };

    function parseMoedaBR(valor) {
      if (!valor) return 0;
      const limpo = valor
        .replace(/[^\d,]/g, "")
        .replace(/\./g, "")
        .replace(",", ".");
      return Number(limpo) || 0;
    }

    function formatarMoedaInput(valor) {
      const numero = valor.replace(/\D/g, "");
      const centavos = (Number(numero) / 100) || 0;
      return centavos.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatarInteiroInput(valor) {
      const numero = valor.replace(/\D/g, "");
      return numero ? Number(numero).toLocaleString("pt-BR") : "";
    }

    function moedaSemCentavos(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function moeda2Casas(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function percentualSemDecimal(valor) {
      return Math.round(valor * 100) + "%";
    }

    function classificarDiagnostico(margemAtual, margemReferencia, impactoSobreFaturamento) {
      const gap = margemReferencia - margemAtual;

      if (gap > 0.10 || impactoSobreFaturamento > 0.20) {
        return "critico";
      }
      if (gap > 0 || impactoSobreFaturamento > 0.10) {
        return "atencao";
      }
      if (margemAtual <= margemReferencia + 0.10) {
        return "saudavel";
      }
      return "acima";
    }

    const precoInput = document.getElementById("precoAtual");
    const custoInput = document.getElementById("custoUnitario");
    const volumeInput = document.getElementById("volume");

    precoInput.addEventListener("input", (e) => {
      e.target.value = formatarMoedaInput(e.target.value);
    });

    custoInput.addEventListener("input", (e) => {
      e.target.value = formatarMoedaInput(e.target.value);
    });

    volumeInput.addEventListener("input", (e) => {
      e.target.value = formatarInteiroInput(e.target.value);
    });

    function montarBlocoSetorial(referencia) {
      return `
        <div class="bloco-setorial">
          <div class="bloco-setorial-titulo">Contexto do seu segmento</div>
          <div class="linha">${referencia.leituraSetorial}</div>
          <div class="linha"><strong>Ponto de atenção:</strong> ${referencia.atencaoSetorial}</div>
        </div>
      `;
    }

    function calcularDiagnostico() {
      const precoAtual = parseMoedaBR(precoInput.value);
      const custoUnitario = parseMoedaBR(custoInput.value);
      const volumeMensal = Number(volumeInput.value.replace(/\./g, "")) || 0;
      const segmentoKey = document.getElementById("segmento").value;

      const erro = document.getElementById("erro");
      const resultado = document.getElementById("resultado");

      erro.style.display = "none";
      resultado.style.display = "none";

      if (!precoAtual || !custoUnitario || !volumeMensal || !segmentoKey || precoAtual <= 0 || custoUnitario < 0) {
        erro.style.display = "block";
        return;
      }

      const referencia = referencias[segmentoKey];

      if (custoUnitario >= precoAtual) {
        const lucroAtualPorUnidade = precoAtual - custoUnitario;

        resultado.innerHTML = `
          <span class="badge critico">Diagnóstico crítico</span>
          <div class="headline critico">Seu preço atual não cobre adequadamente o custo unitário.</div>
          <div class="linha">Pelo recorte informado, sua operação não está preservando margem bruta suficiente.</div>
          <div class="linha">Preço atual: <strong>${moeda2Casas(precoAtual)}</strong></div>
          <div class="linha">Custo por unidade: <strong>${moeda2Casas(custoUnitario)}</strong></div>
          <div class="linha">Lucro bruto por unidade atual: <strong>${moeda2Casas(lucroAtualPorUnidade)}</strong></div>

          <div class="bloco">
            <div class="linha"><strong>Leitura rápida:</strong> antes de comparar seu negócio com a referência do segmento, o primeiro ajuste precisa ser recuperar margem mínima sobre cada venda.</div>
          </div>

          ${montarBlocoSetorial(referencia)}

          <div class="fonte">
            ${referencia.fonteHtml}
          </div>

          <div class="disclaimer">
            <strong>Disclaimer:</strong> este diagnóstico é uma análise inicial, baseada exclusivamente nas informações preenchidas e em referências médias de mercado. Não considera custos fixos, regime tributário, mix de produtos ou serviços, concorrência local, descontos, canais de venda, sazonalidade, elasticidade de demanda, inadimplência, frete, comissões ou estratégia comercial. Os resultados devem ser interpretados como indicativos e não substituem uma análise financeira completa do negócio.
          </div>
        `;
        resultado.style.display = "block";
        return;
      }

      const margemAtual = (precoAtual - custoUnitario) / precoAtual;
      const lucroBrutoAtual = (precoAtual - custoUnitario) * volumeMensal;
      const lucroAtualPorUnidade = precoAtual - custoUnitario;

      const precoReferencia = custoUnitario / (1 - referencia.margem);
      const lucroBrutoReferencia = (precoReferencia - custoUnitario) * volumeMensal;
      const lucroReferenciaPorUnidade = precoReferencia - custoUnitario;

      const oportunidadeLucro = Math.max(0, lucroBrutoReferencia - lucroBrutoAtual);
      const anualizado = oportunidadeLucro * 12;
      const gapPrecoUnitario = Math.max(0, precoReferencia - precoAtual);

      const faturamentoAtual = precoAtual * volumeMensal;
      const impactoSobreFaturamento = faturamentoAtual > 0 ? oportunidadeLucro / faturamentoAtual : 0;

      const nivel = classificarDiagnostico(
        margemAtual,
        referencia.margem,
        impactoSobreFaturamento
      );

      let html = "";

      if (nivel === "critico") {
        html = `
          <span class="badge critico">Diagnóstico crítico</span>
          <div class="headline critico">Sua margem está muito abaixo da referência do seu segmento — há forte indício de subprecificação.</div>

          <div class="linha">
            Com base nos dados informados, sua precificação atual está distante do padrão de margem normalmente observado no seu segmento.
          </div>

          <div class="linha">
            Isso indica que parte relevante do valor que sua operação entrega pode não estar sendo convertida em margem bruta.
          </div>

          <div class="linha">Margem Bruta Atual: <strong>${percentualSemDecimal(margemAtual)}</strong></div>
          <div class="linha">Lucro/Margem Bruta Atual: <strong>${moedaSemCentavos(lucroBrutoAtual)}</strong></div>
          <div class="linha">Lucro bruto por unidade atual: <strong>${moeda2Casas(lucroAtualPorUnidade)}</strong></div>
          <div class="linha">Lucro bruto por unidade na referência: <strong>${moeda2Casas(lucroReferenciaPorUnidade)}</strong></div>
          <div class="linha">Referência do segmento: <strong>${percentualSemDecimal(referencia.margem)}</strong></div>
          <div class="linha">Preço atual: <strong>${moeda2Casas(precoAtual)}</strong></div>
          <div class="linha">Preço de referência estimado: <strong>${moeda2Casas(precoReferencia)}</strong></div>
          <div class="linha">Gap estimado por unidade: <strong>${moeda2Casas(gapPrecoUnitario)}</strong></div>
          <div class="linha">Impacto sobre o faturamento: <strong>${percentualSemDecimal(impactoSobreFaturamento)}</strong></div>

          <div class="bloco">
            <div class="linha"><strong>Oportunidade de lucro adicional:</strong> <strong>${moedaSemCentavos(oportunidadeLucro)} por mês</strong></div>
            <div class="linha">Hoje, sua operação está deixando aproximadamente <strong>${moedaSemCentavos(oportunidadeLucro)}</strong> por mês na mesa.</div>
            <div class="linha">Isso representa cerca de <strong>${percentualSemDecimal(impactoSobreFaturamento)}</strong> do seu faturamento atual.</div>
            <div class="linha">Em 12 meses, isso representa cerca de <strong>${moedaSemCentavos(anualizado)}</strong> em potencial de ganho não capturado.</div>
            <div class="linha">Mantido o volume atual, uma aproximação gradual do preço à referência estimada pode capturar parte relevante dessa margem adicional.</div>
          </div>
        `;
      } else if (nivel === "atencao") {
        html = `
          <span class="badge atencao">Diagnóstico de atenção</span>
          <div class="headline atencao">Sua margem está abaixo da referência do segmento, mas relativamente próxima.</div>

          <div class="linha">
            Seu preço atual parece capturar parte importante do valor da operação, mas ainda há espaço para melhorar margem sem estar, necessariamente, em uma situação crítica.
          </div>

          <div class="linha">Margem Bruta Atual: <strong>${percentualSemDecimal(margemAtual)}</strong></div>
          <div class="linha">Lucro/Margem Bruta Atual: <strong>${moedaSemCentavos(lucroBrutoAtual)}</strong></div>
          <div class="linha">Lucro bruto por unidade atual: <strong>${moeda2Casas(lucroAtualPorUnidade)}</strong></div>
          <div class="linha">Lucro bruto por unidade na referência: <strong>${moeda2Casas(lucroReferenciaPorUnidade)}</strong></div>
          <div class="linha">Referência do segmento: <strong>${percentualSemDecimal(referencia.margem)}</strong></div>
          <div class="linha">Preço atual: <strong>${moeda2Casas(precoAtual)}</strong></div>
          <div class="linha">Preço de referência estimado: <strong>${moeda2Casas(precoReferencia)}</strong></div>
          <div class="linha">Gap estimado por unidade: <strong>${moeda2Casas(gapPrecoUnitario)}</strong></div>
          <div class="linha">Impacto sobre o faturamento: <strong>${percentualSemDecimal(impactoSobreFaturamento)}</strong></div>

          <div class="bloco">
            <div class="linha"><strong>Oportunidade de lucro adicional:</strong> <strong>${moedaSemCentavos(oportunidadeLucro)} por mês</strong></div>
            <div class="linha">Pequenos ajustes de preço, posicionamento ou percepção de valor já podem gerar ganho relevante.</div>
            <div class="linha">Isso representa cerca de <strong>${percentualSemDecimal(impactoSobreFaturamento)}</strong> do seu faturamento atual.</div>
            <div class="linha">Mantido o volume atual, essa diferença representa cerca de <strong>${moedaSemCentavos(anualizado)}</strong> por ano em margem bruta potencial.</div>
          </div>
        `;
      } else if (nivel === "saudavel") {
        html = `
          <span class="badge saudavel">Diagnóstico saudável</span>
          <div class="headline saudavel">Sua precificação está alinhada com a referência do seu segmento.</div>

          <div class="linha">
            Com base nos dados preenchidos, sua margem está dentro da faixa esperada para o segmento selecionado.
          </div>

          <div class="linha">Margem Bruta Atual: <strong>${percentualSemDecimal(margemAtual)}</strong></div>
          <div class="linha">Lucro/Margem Bruta Atual: <strong>${moedaSemCentavos(lucroBrutoAtual)}</strong></div>
          <div class="linha">Lucro bruto por unidade atual: <strong>${moeda2Casas(lucroAtualPorUnidade)}</strong></div>
          <div class="linha">Lucro bruto por unidade na referência: <strong>${moeda2Casas(lucroReferenciaPorUnidade)}</strong></div>
          <div class="linha">Referência do segmento: <strong>${percentualSemDecimal(referencia.margem)}</strong></div>

          <div class="bloco">
            <div class="linha"><strong>Leitura rápida:</strong> neste recorte, não há indicação clara de perda relevante de margem frente à referência utilizada.</div>
            <div class="linha">O próximo foco tende a estar menos em preço e mais em consistência comercial, demanda e eficiência operacional.</div>
          </div>
        `;
      } else {
        html = `
          <span class="badge acima">Acima da referência</span>
          <div class="headline acima">Sua margem está acima da referência do seu segmento.</div>

          <div class="linha">
            Seu preço atual, neste recorte simplificado, indica uma captura de margem superior à referência usada para o segmento.
          </div>

          <div class="linha">Margem Bruta Atual: <strong>${percentualSemDecimal(margemAtual)}</strong></div>
          <div class="linha">Lucro/Margem Bruta Atual: <strong>${moedaSemCentavos(lucroBrutoAtual)}</strong></div>
          <div class="linha">Lucro bruto por unidade atual: <strong>${moeda2Casas(lucroAtualPorUnidade)}</strong></div>
          <div class="linha">Lucro bruto por unidade na referência: <strong>${moeda2Casas(lucroReferenciaPorUnidade)}</strong></div>
          <div class="linha">Referência do segmento: <strong>${percentualSemDecimal(referencia.margem)}</strong></div>

          <div class="bloco">
            <div class="linha"><strong>Leitura rápida:</strong> isso sugere uma precificação forte neste cenário.</div>
            <div class="linha">O ponto de atenção aqui não é capturar mais margem a qualquer custo, mas sustentar volume, percepção de valor e competitividade.</div>
          </div>
        `;
      }

      html += `
        ${montarBlocoSetorial(referencia)}

        <div class="fonte">
          ${referencia.fonteHtml}
        </div>

        <div class="disclaimer">
          <strong>Disclaimer:</strong> este diagnóstico é uma análise inicial, baseada exclusivamente nas informações preenchidas e em referências médias de mercado. Não considera custos fixos, regime tributário, mix de produtos ou serviços, concorrência local, descontos, canais de venda, sazonalidade, elasticidade de demanda, inadimplência, frete, comissões ou estratégia comercial. Os resultados devem ser interpretados como indicativos e não substituem uma análise financeira completa do negócio.
        </div>
      `;

      resultado.innerHTML = html;
      resultado.style.display = "block";
    }
  </script>
