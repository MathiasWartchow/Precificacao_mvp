<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico de Precificação</title>

  <style>
    /* =========================================
       1. DESIGN TOKENS
    ========================================= */
    :root {
      --bg: #f4f7fb;
      --bg-soft: #f8fafc;
      --surface: #ffffff;
      --surface-soft: #fcfdff;

      --text: #0f172a;
      --text-soft: #425466;
      --muted: #64748b;

      --line: #e5eaf1;
      --line-soft: #eef2f7;

      --shadow-lg: 0 24px 60px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-sm: 0 6px 18px rgba(15, 23, 42, 0.04);

      --danger: #c62828;
      --danger-bg: #fdecec;

      --warning: #b26a00;
      --warning-bg: #fff5df;

      --success: #0f7b47;
      --success-bg: #e9f8ef;

      --info: #2563eb;
      --info-bg: #eaf1ff;

      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 14px;

      --space-1: 8px;
      --space-2: 12px;
      --space-3: 16px;
      --space-4: 20px;
      --space-5: 24px;
      --space-6: 30px;

      --container-max: 1120px;
      --transition-fast: 0.15s ease;
    }

    /* =========================================
       2. BASE
    ========================================= */
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #f8fbff 0%, #f4f7fb 45%, #edf2f8 100%);
      color: var(--text);
      padding: 24px;
    }

    h1, h2, h3, h4, p {
      margin: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    /* =========================================
       3. LAYOUT
    ========================================= */
    .wrap {
      max-width: var(--container-max);
      margin: 0 auto;
    }

    .app-shell {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-xl);
      padding: 20px;
      box-shadow: var(--shadow-lg);
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(15, 23, 42, 0.04);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      box-shadow: var(--shadow-md);
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    /* =========================================
       4. HEADER / FORM
    ========================================= */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: #334155;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0f172a, #334155);
      display: inline-block;
    }

    .page-title {
      margin-bottom: 10px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text);
      max-width: 760px;
    }

    .page-subtitle {
      margin-bottom: 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 760px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-weight: 700;
      font-size: 14px;
      color: #243041;
      letter-spacing: -0.01em;
    }

    .field-input,
    .field-select {
      width: 100%;
      border-radius: var(--radius-sm);
      border: 1px solid #d8e0ea;
      background: var(--surface);
      color: var(--text);
      padding: 15px 16px;
      font-size: 16px;
      transition:
        border-color var(--transition-fast),
        box-shadow var(--transition-fast),
        transform var(--transition-fast);
      box-shadow: 0 1px 1px rgba(15, 23, 42, 0.02);
    }

    .field-input::placeholder {
      color: #94a3b8;
    }

    .field-input:focus,
    .field-select:focus {
      outline: none;
      border-color: var(--text);
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
      transform: translateY(-1px);
    }

    .action-row {
      display: flex;
      justify-content: flex-start;
      margin-top: 4px;
    }

    .primary-button {
      width: 100%;
      max-width: 280px;
      border: none;
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.18);
      transition:
        transform var(--transition-fast),
        opacity var(--transition-fast),
        box-shadow var(--transition-fast);
    }

    .primary-button:hover {
      opacity: 0.98;
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.22);
    }

    .error-message {
      margin-top: 14px;
      color: var(--danger);
      font-weight: 700;
      display: none;
      font-size: 14px;
    }

    /* =========================================
       5. RESULT WRAPPER
    ========================================= */
    .result {
      margin-top: 28px;
      display: none;
    }

    .surface-box {
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-soft) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
    }

    /* =========================================
       6. HERO
    ========================================= */
    .hero-main,
    .hero-side {
      position: relative;
      overflow: hidden;
    }

    .hero-main {
      padding: 24px;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0) 70%);
      pointer-events: none;
    }

    .hero-side {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-side::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(15, 23, 42, 0.05) 0%, rgba(15, 23, 42, 0) 70%);
      pointer-events: none;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .status-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .status-badge.critico {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .status-badge.critico .status-badge-dot {
      background: var(--danger);
    }

    .status-badge.atencao {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .status-badge.atencao .status-badge-dot {
      background: var(--warning);
    }

    .status-badge.saudavel {
      background: var(--success-bg);
      color: var(--success);
    }

    .status-badge.saudavel .status-badge-dot {
      background: var(--success);
    }

    .status-badge.acima {
      background: var(--info-bg);
      color: var(--info);
    }

    .status-badge.acima .status-badge-dot {
      background: var(--info);
    }

    .hero-headline {
      margin-bottom: 10px;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: -0.03em;
      max-width: 720px;
    }

    .hero-headline.critico {
      color: var(--danger);
    }

    .hero-headline.atencao {
      color: var(--warning);
    }

    .hero-headline.saudavel {
      color: var(--success);
    }

    .hero-headline.acima {
      color: var(--info);
    }

    .hero-text {
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.65;
      max-width: 95%;
    }

    .hero-side-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }

    .hero-side-value {
      font-size: 42px;
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .hero-side-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 260px;
    }

    /* =========================================
       7. METRIC CARDS
    ========================================= */
    .metric-card {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, #cbd5e1, transparent);
      opacity: 0.9;
    }

    .metric-card.primary::before {
      background: linear-gradient(90deg, #0f172a, #475569);
    }

    .metric-card.warning::before {
      background: linear-gradient(90deg, #d97706, #fbbf24);
    }

    .metric-card.info::before {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .metric-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.35px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .metric-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* =========================================
       8. COMPARE BOXES
    ========================================= */
    .compare-box {
      padding: 22px;
    }

    .compare-title {
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 800;
      color: #243041;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .compare-list {
      display: grid;
      gap: 12px;
    }

    .compare-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .compare-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .compare-name {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 70%;
    }

    .compare-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-align: right;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    /* =========================================
       9. CONTEXT / DISCLAIMER
    ========================================= */
    .context-box {
      padding: 22px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
    }

    .context-title {
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 800;
      color: #243041;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .context-text,
    .context-alert {
      font-size: 15px;
      line-height: 1.68;
      color: var(--text-soft);
    }

    .context-alert {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line-soft);
    }

    .source-text {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .disclaimer-box {
      padding: 18px 20px;
      background: #fbfcfe;
    }

    .disclaimer-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* =========================================
       10. RESPONSIVE
    ========================================= */
    @media (max-width: 980px) {
      .hero-grid,
      .metrics-grid,
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .hero-side-value {
        font-size: 36px;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .app-shell {
        padding: 12px;
        border-radius: 22px;
      }

      .card {
        padding: 20px;
        border-radius: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 14px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .primary-button {
        max-width: 100%;
      }

      .page-title {
        font-size: 28px;
      }

      .hero-headline {
        font-size: 24px;
      }

      .metric-value {
        font-size: 26px;
      }

      .compare-value {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {
      .hero-main,
      .hero-side,
      .metric-card,
      .compare-box,
      .context-box,
      .disclaimer-box {
        border-radius: var(--radius-md);
      }

      .hero-main,
      .hero-side,
      .metric-card,
      .compare-box,
      .context-box {
        padding: 18px;
      }

      .hero-headline {
        font-size: 22px;
      }

      .hero-side-value {
        font-size: 32px;
      }

      .metric-value {
        font-size: 24px;
      }

      .hero-text,
      .metric-desc,
      .context-text,
      .context-alert {
        font-size: 14px;
      }

      .compare-row {
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app-shell">
      <div class="card">
        <div class="topbar">
          <div class="brand-chip">
            <span class="brand-dot"></span>
            Diagnóstico Financeiro de Precificação
          </div>
        </div>

        <h1 class="page-title">Descubra se sua margem está abaixo da referência do seu segmento</h1>
        <p class="page-subtitle">
          Preencha os dados e veja, em segundos, como sua margem está comparada ao seu segmento.
        </p>

        <div class="grid">
          <div class="form-grid">
            <div class="field">
              <label class="field-label" for="precoAtual">Preço atual</label>
              <input class="field-input" id="precoAtual" type="text" inputmode="decimal" placeholder="R$ 0,00" />
            </div>

            <div class="field">
              <label class="field-label" for="custoUnitario">Custo por unidade (R$)</label>
              <input class="field-input" id="custoUnitario" type="text" inputmode="decimal" placeholder="R$ 0,00" />
            </div>

            <div class="field">
              <label class="field-label" for="volume">Volume mensal</label>
              <input class="field-input" id="volume" type="text" inputmode="numeric" placeholder="0" />
            </div>

            <div class="field">
              <label class="field-label" for="segmento">Segmento</label>
              <select class="field-select" id="segmento">
                <option value="">Selecione</option>
                <option value="mercado_mercearia">Mercado / Mercearia</option>
                <option value="roupas_moda">Roupas / Moda</option>
                <option value="cosmeticos_acessorios">Cosméticos / Acessórios</option>
                <option value="pet_shop">Pets / Pet shop</option>
                <option value="agencia_consultoria">Agência / Consultoria</option>
                <option value="salao_estetica">Salão de beleza / Estética</option>
                <option value="industria">Indústria</option>
              </select>
            </div>
          </div>

          <div class="action-row">
            <button class="primary-button" onclick="handleDiagnosisCalculation()">Gerar diagnóstico</button>
          </div>
        </div>

        <div id="erro" class="error-message">Preencha todos os campos corretamente.</div>
        <div id="resultado" class="result"></div>
      </div>
    </div>
  </div>

  <script>
    /* =========================================
       1. BUSINESS CONSTANTS
    ========================================= */
    const SEGMENT_REFERENCES = {
      mercado_mercearia: {
        name: "Mercado / Mercearia",
        referenceMargin: 0.15,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 15% de margem bruta, alinhado ao topo da faixa de comércio/lojas usada pelo Sebrae.
        `,
        contextText: `
          Em mercado e mercearia, a operação costuma depender de giro alto, sensibilidade a preço e margem mais apertada. Por isso, pequenos desvios de preço ou custo podem comprometer uma parcela relevante do resultado mensal.
        `,
        attentionText: `
          O principal risco aqui é operar com muito volume e pouca sobra financeira. Quando a margem unitária fica comprimida demais, o negócio vende, gira, mas captura menos resultado do que poderia.
        `
      },
      roupas_moda: {
        name: "Roupas / Moda",
        referenceMargin: 0.50,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 50% de margem bruta, coerente com a dinâmica típica de varejo de moda e posicionamento do setor.
        `,
        contextText: `
          Em moda, a margem costuma ser mais alta porque o preço não depende só do custo da peça, mas também de posicionamento, marca, coleção, percepção de valor e risco comercial do estoque.
        `,
        attentionText: `
          Um ponto crítico do setor é o risco de ficar com estoque parado, coleção antiga ou peças sem demanda. Essa exposição normalmente exige uma margem mais robusta nas vendas que giram bem, para compensar remarcações, liquidações e capital empatado em produtos que podem perder força comercial.
        `
      },
      cosmeticos_acessorios: {
        name: "Cosméticos / Acessórios",
        referenceMargin: 0.35,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 35% de margem bruta, como premissa conservadora para uma categoria com potencial de markup superior ao comércio tradicional.
        `,
        contextText: `
          Em cosméticos e acessórios, a margem costuma ser mais influenciada por valor percebido, marca, apresentação e posicionamento do que apenas por custo direto. Isso normalmente abre mais espaço de captura de margem do que no varejo tradicional.
        `,
        attentionText: `
          O risco aqui é competir apenas por preço em uma categoria em que branding, experiência e percepção podem sustentar uma margem melhor. Quando isso acontece, o negócio pode vender, mas monetizar menos do que a categoria permite.
        `
      },
      pet_shop: {
        name: "Pets / Pet shop",
        referenceMargin: 0.20,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 20% de margem bruta, como premissa intermediária para um segmento que combina venda de produtos e serviços.
        `,
        contextText: `
          No segmento pet, a operação costuma combinar produtos, serviços e recorrência. Isso tende a abrir espaço para uma margem mais equilibrada quando o preço está bem posicionado e o cliente percebe conveniência, confiança e continuidade no atendimento.
        `,
        attentionText: `
          O ponto de atenção é tratar todo o negócio como se tivesse a mesma lógica de margem. Em pet, produtos e serviços costumam ter comportamentos diferentes, e isso pode esconder oportunidade de captura melhor de resultado.
        `
      },
      agencia_consultoria: {
        name: "Agência / Consultoria",
        referenceMargin: 0.30,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços intelectuais e de maior valor agregado.
        `,
        contextText: `
          Em agência e consultoria, o preço tende a refletir menos custo direto e mais especialização, confiança, repertório e valor percebido pelo cliente. Por isso, a qualidade da entrega e o posicionamento influenciam fortemente a margem possível.
        `,
        attentionText: `
          O risco mais comum é precificar só com base em horas, esforço ou custo interno, sem capturar adequadamente o valor gerado para o cliente. Isso pode limitar margem mesmo em operações com boa entrega.
        `
      },
      salao_estetica: {
        name: "Salão de beleza / Estética",
        referenceMargin: 0.30,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços de beleza e estética.
        `,
        contextText: `
          Em beleza e estética, a margem depende fortemente de percepção de qualidade, experiência entregue, recorrência e capacidade de fidelização. O preço costuma carregar mais do que o custo do procedimento em si.
        `,
        attentionText: `
          O principal risco é manter preços pressionados em um negócio que depende de agenda, experiência e relacionamento. Isso pode gerar ocupação, mas com captura limitada de valor por atendimento.
        `
      },
      industria: {
        name: "Indústria",
        referenceMargin: 0.10,
        sourceHtml: `
          <strong>Referência utilizada:</strong> 10% de margem bruta, em leitura conservadora para o produto.
        `,
        contextText: `
          Em indústria, pequenas variações de margem por unidade podem ganhar grande relevância quando aplicadas em escala. Por isso, mesmo diferenças aparentemente pequenas de preço ou custo podem gerar impacto relevante no resultado total.
        `,
        attentionText: `
          O risco aqui é normalizar margens comprimidas por hábito operacional. Em negócios industriais, disciplina de margem é importante porque qualquer desvio tende a ser amplificado pelo volume.
        `
      }
    };

    const DIAGNOSIS_LABELS = {
      critico: "Diagnóstico crítico",
      atencao: "Diagnóstico de atenção",
      saudavel: "Diagnóstico saudável",
      acima: "Acima da referência"
    };

    /* =========================================
       2. DOM HELPERS
    ========================================= */
    const dom = {
      priceInput: document.getElementById("precoAtual"),
      costInput: document.getElementById("custoUnitario"),
      volumeInput: document.getElementById("volume"),
      segmentSelect: document.getElementById("segmento"),
      errorBox: document.getElementById("erro"),
      resultBox: document.getElementById("resultado")
    };

    /* =========================================
       3. FORMATTERS / PARSERS
    ========================================= */
    function parseBrazilianCurrency(value) {
      if (!value) return 0;

      const sanitized = value
        .replace(/[^\d,]/g, "")
        .replace(/\./g, "")
        .replace(",", ".");

      return Number(sanitized) || 0;
    }

    function formatCurrencyInput(value) {
      const numericString = value.replace(/\D/g, "");
      const amount = (Number(numericString) / 100) || 0;

      return amount.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatIntegerInput(value) {
      const numericString = value.replace(/\D/g, "");
      return numericString ? Number(numericString).toLocaleString("pt-BR") : "";
    }

    function formatCurrencyNoDecimals(value) {
      return value.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function formatCurrencyTwoDecimals(value) {
      return value.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatPercentRounded(decimalValue) {
      return `${Math.round(decimalValue * 100)}%`;
    }

    /* =========================================
       4. INPUT BINDINGS
    ========================================= */
    function bindInputMasks() {
      dom.priceInput.addEventListener("input", (event) => {
        event.target.value = formatCurrencyInput(event.target.value);
      });

      dom.costInput.addEventListener("input", (event) => {
        event.target.value = formatCurrencyInput(event.target.value);
      });

      dom.volumeInput.addEventListener("input", (event) => {
        event.target.value = formatIntegerInput(event.target.value);
      });
    }

    /* =========================================
       5. FORM / VALIDATION
    ========================================= */
    function getFormValues() {
      return {
        priceCurrent: parseBrazilianCurrency(dom.priceInput.value),
        costPerUnit: parseBrazilianCurrency(dom.costInput.value),
        monthlyVolume: Number(dom.volumeInput.value.replace(/\./g, "")) || 0,
        segmentKey: dom.segmentSelect.value
      };
    }

    function isFormValid(formValues) {
      const { priceCurrent, costPerUnit, monthlyVolume, segmentKey } = formValues;

      return Boolean(
        priceCurrent &&
        costPerUnit >= 0 &&
        monthlyVolume &&
        segmentKey &&
        priceCurrent > 0
      );
    }

    function showError() {
      dom.errorBox.style.display = "block";
      dom.resultBox.style.display = "none";
    }

    function clearError() {
      dom.errorBox.style.display = "none";
    }

    /* =========================================
       6. BUSINESS RULES
    ========================================= */
    function classifyDiagnosis(currentMargin, referenceMargin, revenueImpact) {
      const marginGap = referenceMargin - currentMargin;

      if (marginGap > 0.10 || revenueImpact > 0.20) return "critico";
      if (marginGap > 0 || revenueImpact > 0.10) return "atencao";
      if (currentMargin <= referenceMargin + 0.10) return "saudavel";
      return "acima";
    }

    function calculateDiagnosisMetrics(formValues) {
      const reference = SEGMENT_REFERENCES[formValues.segmentKey];

      const revenueCurrent = formValues.priceCurrent * formValues.monthlyVolume;
      const grossProfitPerUnitCurrent = formValues.priceCurrent - formValues.costPerUnit;

      const grossMarginCurrent = grossProfitPerUnitCurrent / formValues.priceCurrent;
      const grossProfitCurrent = grossProfitPerUnitCurrent * formValues.monthlyVolume;

      const referencePricePerUnit = formValues.costPerUnit / (1 - reference.referenceMargin);
      const grossProfitPerUnitReference = referencePricePerUnit - formValues.costPerUnit;
      const grossProfitReference = grossProfitPerUnitReference * formValues.monthlyVolume;

      const additionalProfitOpportunity = Math.max(0, grossProfitReference - grossProfitCurrent);
      const annualPotential = additionalProfitOpportunity * 12;
      const gapPerUnit = Math.max(0, referencePricePerUnit - formValues.priceCurrent);
      const revenueImpact = revenueCurrent > 0 ? additionalProfitOpportunity / revenueCurrent : 0;

      const diagnosisLevel = classifyDiagnosis(
        grossMarginCurrent,
        reference.referenceMargin,
        revenueImpact
      );

      return {
        reference,
        revenueCurrent,
        grossMarginCurrent,
        grossProfitCurrent,
        grossProfitPerUnitCurrent,
        referencePricePerUnit,
        grossProfitPerUnitReference,
        grossProfitReference,
        additionalProfitOpportunity,
        annualPotential,
        gapPerUnit,
        revenueImpact,
        diagnosisLevel
      };
    }

    /* =========================================
       7. DIAGNOSIS CONTENT MODELS
    ========================================= */
    function getHeroContent(level, metrics) {
      if (level === "critico") {
        return {
          title: "Sua margem está muito abaixo da referência do seu segmento.",
          subtitle: "Há forte indício de subprecificação, com impacto relevante na capacidade de captura de resultado da operação.",
          highlightValue: formatCurrencyNoDecimals(metrics.additionalProfitOpportunity),
          highlightSubtext: "de oportunidade de lucro adicional por mês"
        };
      }

      if (level === "atencao") {
        return {
          title: "Sua margem está abaixo da referência do segmento, mas relativamente próxima.",
          subtitle: "Seu preço atual já captura parte do valor da operação, mas ainda existe espaço concreto para melhorar a margem.",
          highlightValue: formatCurrencyNoDecimals(metrics.additionalProfitOpportunity),
          highlightSubtext: "de oportunidade de lucro adicional por mês"
        };
      }

      if (level === "saudavel") {
        return {
          title: "Sua precificação está alinhada com a referência do seu segmento.",
          subtitle: "Neste recorte, não há indicação clara de perda relevante de margem frente à referência utilizada.",
          highlightValue: formatPercentRounded(metrics.grossMarginCurrent),
          highlightSubtext: "de margem bruta atual"
        };
      }

      return {
        title: "Sua margem está acima da referência do seu segmento.",
        subtitle: "Seu preço atual indica uma captura de margem superior à referência usada para o segmento neste cenário.",
        highlightValue: formatPercentRounded(metrics.grossMarginCurrent),
        highlightSubtext: "de margem bruta atual"
      };
    }

    /* =========================================
       8. RENDER HELPERS
    ========================================= */
    function renderStatusBadge(level) {
      return `
        <span class="status-badge ${level}">
          <span class="status-badge-dot"></span>
          ${DIAGNOSIS_LABELS[level]}
        </span>
      `;
    }

    function renderHero(level, heroContent) {
      return `
        <div class="hero-grid">
          <div class="hero-main surface-box">
            ${renderStatusBadge(level)}
            <h2 class="hero-headline ${level}">${heroContent.title}</h2>
            <p class="hero-text">${heroContent.subtitle}</p>
          </div>

          <div class="hero-side surface-box">
            <div class="hero-side-label">Indicador principal</div>
            <div class="hero-side-value">${heroContent.highlightValue}</div>
            <div class="hero-side-sub">${heroContent.highlightSubtext}</div>
          </div>
        </div>
      `;
    }

    function renderMetricCard({ variant, label, value, description }) {
      return `
        <div class="metric-card ${variant} surface-box">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-desc">${description}</div>
        </div>
      `;
    }

    function renderMetricsSection(level, metrics) {
      if (level === "critico" || level === "atencao") {
        return `
          <div class="metrics-grid">
            ${renderMetricCard({
              variant: "primary",
              label: "Oportunidade mensal",
              value: formatCurrencyNoDecimals(metrics.additionalProfitOpportunity),
              description: "Margem adicional estimada que sua operação pode capturar por mês."
            })}

            ${renderMetricCard({
              variant: "warning",
              label: "Impacto no faturamento",
              value: formatPercentRounded(metrics.revenueImpact),
              description: "Parcela estimada do faturamento atual que hoje não está sendo convertida em margem."
            })}

            ${renderMetricCard({
              variant: "info",
              label: "Gap por unidade",
              value: formatCurrencyTwoDecimals(metrics.gapPerUnit),
              description: "Diferença estimada entre seu preço atual e o preço de referência do segmento."
            })}
          </div>
        `;
      }

      return `
        <div class="metrics-grid">
          ${renderMetricCard({
            variant: "primary",
            label: "Margem atual",
            value: formatPercentRounded(metrics.grossMarginCurrent),
            description: "Margem bruta calculada com base no preço e custo informados."
          })}

          ${renderMetricCard({
            variant: "warning",
            label: "Lucro bruto mensal",
            value: formatCurrencyNoDecimals(metrics.grossProfitCurrent),
            description: "Resultado bruto mensal estimado com o volume atual informado."
          })}

          ${renderMetricCard({
            variant: "info",
            label: "Referência do segmento",
            value: formatPercentRounded(metrics.reference.referenceMargin),
            description: "Margem usada como base comparativa para o segmento selecionado."
          })}
        </div>
      `;
    }

    function renderCompareRow(name, value) {
      return `
        <div class="compare-row">
          <div class="compare-name">${name}</div>
          <div class="compare-value">${value}</div>
        </div>
      `;
    }

    function renderCurrentScenarioBox(formValues, metrics) {
      return `
        <div class="compare-box surface-box">
          <h3 class="compare-title">Seu cenário atual</h3>
          <div class="compare-list">
            ${renderCompareRow("Margem bruta atual", formatPercentRounded(metrics.grossMarginCurrent))}
            ${renderCompareRow("Lucro/margem bruta atual", formatCurrencyNoDecimals(metrics.grossProfitCurrent))}
            ${renderCompareRow("Lucro bruto por unidade atual", formatCurrencyTwoDecimals(metrics.grossProfitPerUnitCurrent))}
            ${renderCompareRow("Preço atual", formatCurrencyTwoDecimals(formValues.priceCurrent))}
          </div>
        </div>
      `;
    }

    function renderReferenceScenarioBox(level, metrics) {
      const annualPotentialRow = (level === "critico" || level === "atencao")
        ? renderCompareRow("Potencial anual estimado", formatCurrencyNoDecimals(metrics.annualPotential))
        : "";

      return `
        <div class="compare-box surface-box">
          <h3 class="compare-title">Referência do segmento</h3>
          <div class="compare-list">
            ${renderCompareRow("Margem de referência", formatPercentRounded(metrics.reference.referenceMargin))}
            ${renderCompareRow("Lucro bruto por unidade na referência", formatCurrencyTwoDecimals(metrics.grossProfitPerUnitReference))}
            ${renderCompareRow("Preço de referência estimado", formatCurrencyTwoDecimals(metrics.referencePricePerUnit))}
            ${annualPotentialRow}
          </div>
        </div>
      `;
    }

    function renderComparisonSection(formValues, metrics) {
      return `
        <div class="compare-grid">
          ${renderCurrentScenarioBox(formValues, metrics)}
          ${renderReferenceScenarioBox(metrics.diagnosisLevel, metrics)}
        </div>
      `;
    }

    function renderSegmentContext(reference) {
      return `
        <div class="context-box surface-box">
          <h3 class="context-title">Contexto do seu segmento</h3>
          <p class="context-text">${reference.contextText}</p>
          <p class="context-alert"><strong>Ponto de atenção:</strong> ${reference.attentionText}</p>
          <div class="source-text">${reference.sourceHtml}</div>
        </div>
      `;
    }

    function renderDisclaimer() {
      return `
        <div class="disclaimer-box surface-box">
          <p class="disclaimer-text">
            <strong>Disclaimer:</strong> este diagnóstico é uma análise inicial, baseada exclusivamente nas informações preenchidas e em referências médias de mercado. Não considera custos fixos, regime tributário, mix de produtos ou serviços, concorrência local, descontos, canais de venda, sazonalidade, elasticidade de demanda, inadimplência, frete, comissões ou estratégia comercial. Os resultados devem ser interpretados como indicativos e não substituem uma análise financeira completa do negócio.
          </p>
        </div>
      `;
    }

    function renderCriticalCostCoverageCase(formValues, reference) {
      return `
        <div class="hero-grid">
          <div class="hero-main surface-box">
            ${renderStatusBadge("critico")}
            <h2 class="hero-headline critico">Seu preço atual não cobre adequadamente o custo unitário.</h2>
            <p class="hero-text">
              Antes de comparar seu negócio com a referência do segmento, o primeiro ajuste precisa ser recuperar margem mínima sobre cada venda.
            </p>
          </div>

          <div class="hero-side surface-box">
            <div class="hero-side-label">Indicador principal</div>
            <div class="hero-side-value">${formatCurrencyTwoDecimals(formValues.priceCurrent - formValues.costPerUnit)}</div>
            <div class="hero-side-sub">Lucro bruto por unidade atual neste cenário.</div>
          </div>
        </div>

        <div class="compare-grid">
          <div class="compare-box surface-box">
            <h3 class="compare-title">Seu cenário atual</h3>
            <div class="compare-list">
              ${renderCompareRow("Preço atual", formatCurrencyTwoDecimals(formValues.priceCurrent))}
              ${renderCompareRow("Custo por unidade", formatCurrencyTwoDecimals(formValues.costPerUnit))}
              ${renderCompareRow("Lucro bruto por unidade atual", formatCurrencyTwoDecimals(formValues.priceCurrent - formValues.costPerUnit))}
            </div>
          </div>

          <div class="compare-box surface-box">
            <h3 class="compare-title">Leitura rápida</h3>
            <div class="compare-list">
              ${renderCompareRow("Status", "Crítico")}
              ${renderCompareRow("Prioridade", "Rever preço")}
            </div>
          </div>
        </div>

        ${renderSegmentContext(reference)}
        ${renderDisclaimer()}
      `;
    }

    /* =========================================
       9. MAIN RENDER PIPELINE
    ========================================= */
    function renderDiagnosis(formValues, metrics) {
      const heroContent = getHeroContent(metrics.diagnosisLevel, metrics);

      return `
        ${renderHero(metrics.diagnosisLevel, heroContent)}
        ${renderMetricsSection(metrics.diagnosisLevel, metrics)}
        ${renderComparisonSection(formValues, metrics)}
        ${renderSegmentContext(metrics.reference)}
        ${renderDisclaimer()}
      `;
    }

    function renderResult(html) {
      dom.resultBox.innerHTML = html;
      dom.resultBox.style.display = "block";
    }

    /* =========================================
       10. MAIN CONTROLLER
    ========================================= */
    function handleDiagnosisCalculation() {
      clearError();

      const formValues = getFormValues();

      if (!isFormValid(formValues)) {
        showError();
        return;
      }

      const reference = SEGMENT_REFERENCES[formValues.segmentKey];

      if (formValues.costPerUnit >= formValues.priceCurrent) {
        renderResult(renderCriticalCostCoverageCase(formValues, reference));
        return;
      }

      const metrics = calculateDiagnosisMetrics(formValues);
      renderResult(renderDiagnosis(formValues, metrics));
    }

    /* =========================================
       11. INIT
    ========================================= */
    bindInputMasks();
  </script>
</body>
</html>
