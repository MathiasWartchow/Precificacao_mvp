<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico de Precificação</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --bg-soft: #f8fafc;
      --card: #ffffff;
      --card-2: #fcfdff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e5eaf1;
      --line-2: #eef2f7;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      --shadow-soft: 0 6px 18px rgba(15, 23, 42, 0.04);

      --danger: #c62828;
      --danger-bg: #fdecec;
      --warning: #b26a00;
      --warning-bg: #fff5df;
      --success: #0f7b47;
      --success-bg: #e9f8ef;
      --info: #2563eb;
      --info-bg: #eaf1ff;

      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #f8fbff 0%, #f4f7fb 45%, #edf2f8 100%);
      color: var(--text);
      padding: 24px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .app-shell {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(15, 23, 42, 0.04);
      border-radius: var(--radius-xl);
      padding: 30px;
      box-shadow: var(--shadow);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      color: #334155;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .brand-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0f172a, #334155);
      display: inline-block;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: -0.03em;
      color: var(--text);
      max-width: 760px;
    }

    .sub {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 760px;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      color: #243041;
      letter-spacing: -0.01em;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 14px;
      font-size: 16px;
    }

    input,
    select {
      border: 1px solid #d8e0ea;
      background: #fff;
      color: var(--text);
      padding: 15px 16px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      box-shadow: 0 1px 1px rgba(15, 23, 42, 0.02);
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #0f172a;
      box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
      transform: translateY(-1px);
    }

    .action-row {
      display: flex;
      justify-content: flex-start;
      margin-top: 4px;
    }

    button {
      border: none;
      padding: 16px 20px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      font-weight: 800;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.18);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      max-width: 280px;
    }

    button:hover {
      opacity: 0.98;
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.22);
    }

    .erro {
      margin-top: 14px;
      color: var(--danger);
      font-weight: 700;
      display: none;
      font-size: 14px;
    }

    .resultado {
      margin-top: 28px;
      display: none;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .hero-main,
    .hero-side,
    .metric-card,
    .compare-box,
    .context-box,
    .disclaimer-box {
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
    }

    .hero-main {
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -40px;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.08) 0%, rgba(37, 99, 235, 0) 70%);
      pointer-events: none;
    }

    .hero-side {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-side::after {
      content: "";
      position: absolute;
      right: -30px;
      bottom: -30px;
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(15, 23, 42, 0.05) 0%, rgba(15, 23, 42, 0) 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .badge .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .badge.critico {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .badge.critico .dot {
      background: var(--danger);
    }

    .badge.atencao {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .badge.atencao .dot {
      background: var(--warning);
    }

    .badge.saudavel {
      background: var(--success-bg);
      color: var(--success);
    }

    .badge.saudavel .dot {
      background: var(--success);
    }

    .badge.acima {
      background: var(--info-bg);
      color: var(--info);
    }

    .badge.acima .dot {
      background: var(--info);
    }

    .headline {
      margin: 0 0 10px;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: -0.03em;
      max-width: 720px;
    }

    .headline.critico {
      color: var(--danger);
    }

    .headline.atencao {
      color: var(--warning);
    }

    .headline.saudavel {
      color: var(--success);
    }

    .headline.acima {
      color: var(--info);
    }

    .hero-text {
      margin: 0;
      color: #425466;
      font-size: 16px;
      line-height: 1.65;
      max-width: 95%;
    }

    .hero-side-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.4px;
      margin-bottom: 10px;
    }

    .hero-side-value {
      font-size: 42px;
      line-height: 0.98;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .hero-side-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 260px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .metric-card {
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, #cbd5e1, transparent);
      opacity: 0.8;
    }

    .metric-card.primary::before {
      background: linear-gradient(90deg, #0f172a, #475569);
    }

    .metric-card.warning::before {
      background: linear-gradient(90deg, #d97706, #fbbf24);
    }

    .metric-card.info::before {
      background: linear-gradient(90deg, #2563eb, #60a5fa);
    }

    .metric-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.35px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .metric-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .compare-box {
      padding: 22px;
    }

    .compare-title {
      margin: 0 0 16px;
      font-size: 13px;
      font-weight: 800;
      color: #243041;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .compare-list {
      display: grid;
      gap: 12px;
    }

    .compare-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-2);
    }

    .compare-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .compare-name {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      max-width: 70%;
    }

    .compare-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-align: right;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .context-box {
      padding: 22px;
      margin-bottom: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
    }

    .context-title {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 800;
      color: #243041;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .context-text,
    .context-alert {
      margin: 0;
      font-size: 15px;
      line-height: 1.68;
      color: #425466;
    }

    .context-alert {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line-2);
    }

    .fonte {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .disclaimer-box {
      padding: 18px 20px;
      background: #fbfcfe;
    }

    .disclaimer {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .metrics-grid,
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .hero-side-value {
        font-size: 36px;
      }
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .app-shell {
        padding: 12px;
        border-radius: 22px;
      }

      .card {
        padding: 20px;
        border-radius: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 14px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      button {
        max-width: 100%;
      }

      h1 {
        font-size: 28px;
      }

      .headline {
        font-size: 24px;
      }

      .metric-value {
        font-size: 26px;
      }

      .compare-value {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {
      .hero-main,
      .hero-side,
      .metric-card,
      .compare-box,
      .context-box,
      .disclaimer-box {
        border-radius: 16px;
      }

      .hero-main,
      .hero-side,
      .metric-card,
      .compare-box,
      .context-box {
        padding: 18px;
      }

      .headline {
        font-size: 22px;
      }

      .hero-side-value {
        font-size: 32px;
      }

      .metric-value {
        font-size: 24px;
      }

      .hero-text,
      .metric-desc,
      .context-text,
      .context-alert {
        font-size: 14px;
      }

      .compare-row {
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app-shell">
      <div class="card">
        <div class="topbar">
          <div class="brand-chip">
            <span class="brand-dot"></span>
            Diagnóstico Financeiro de Precificação
          </div>
        </div>

        <h1>Descubra se sua margem está abaixo da referência do seu segmento</h1>
        <p class="sub">
          Preencha os dados e veja, em segundos, como sua margem está comparada ao seu segmento.
        </p>

        <div class="grid">
          <div class="form-grid">
            <div class="field">
              <label for="precoAtual">Preço atual</label>
              <input id="precoAtual" type="text" inputmode="decimal" placeholder="R$ 0,00" />
            </div>

            <div class="field">
              <label for="custoUnitario">Custo por unidade (R$)</label>
              <input id="custoUnitario" type="text" inputmode="decimal" placeholder="R$ 0,00" />
            </div>

            <div class="field">
              <label for="volume">Volume mensal</label>
              <input id="volume" type="text" inputmode="numeric" placeholder="0" />
            </div>

            <div class="field">
              <label for="segmento">Segmento</label>
              <select id="segmento">
                <option value="">Selecione</option>
                <option value="mercado_mercearia">Mercado / Mercearia</option>
                <option value="roupas_moda">Roupas / Moda</option>
                <option value="cosmeticos_acessorios">Cosméticos / Acessórios</option>
                <option value="pet_shop">Pets / Pet shop</option>
                <option value="agencia_consultoria">Agência / Consultoria</option>
                <option value="salao_estetica">Salão de beleza / Estética</option>
                <option value="industria">Indústria</option>
              </select>
            </div>
          </div>

          <div class="action-row">
            <button onclick="calcularDiagnostico()">Gerar diagnóstico</button>
          </div>
        </div>

        <div id="erro" class="erro">Preencha todos os campos corretamente.</div>
        <div id="resultado" class="resultado"></div>
      </div>
    </div>
  </div>

  <script>
    const referencias = {
      mercado_mercearia: {
        nome: "Mercado / Mercearia",
        margem: 0.15,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 15% de margem bruta, alinhado ao topo da faixa de comércio/lojas usada pelo Sebrae.
        `,
        leituraSetorial: `
          Em mercado e mercearia, a operação costuma depender de giro alto, sensibilidade a preço e margem mais apertada. Por isso, pequenos desvios de preço ou custo podem comprometer uma parcela relevante do resultado mensal.
        `,
        atencaoSetorial: `
          O principal risco aqui é operar com muito volume e pouca sobra financeira. Quando a margem unitária fica comprimida demais, o negócio vende, gira, mas captura menos resultado do que poderia.
        `
      },
      roupas_moda: {
        nome: "Roupas / Moda",
        margem: 0.50,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 50% de margem bruta, coerente com a dinâmica típica de varejo de moda e posicionamento do setor.
        `,
        leituraSetorial: `
          Em moda, a margem costuma ser mais alta porque o preço não depende só do custo da peça, mas também de posicionamento, marca, coleção, percepção de valor e risco comercial do estoque.
        `,
        atencaoSetorial: `
          Um ponto crítico do setor é o risco de ficar com estoque parado, coleção antiga ou peças sem demanda. Essa exposição normalmente exige uma margem mais robusta nas vendas que giram bem, para compensar remarcações, liquidações e capital empatado em produtos que podem perder força comercial.
        `
      },
      cosmeticos_acessorios: {
        nome: "Cosméticos / Acessórios",
        margem: 0.35,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 35% de margem bruta, como premissa conservadora para uma categoria com potencial de markup superior ao comércio tradicional.
        `,
        leituraSetorial: `
          Em cosméticos e acessórios, a margem costuma ser mais influenciada por valor percebido, marca, apresentação e posicionamento do que apenas por custo direto. Isso normalmente abre mais espaço de captura de margem do que no varejo tradicional.
        `,
        atencaoSetorial: `
          O risco aqui é competir apenas por preço em uma categoria em que branding, experiência e percepção podem sustentar uma margem melhor. Quando isso acontece, o negócio pode vender, mas monetizar menos do que a categoria permite.
        `
      },
      pet_shop: {
        nome: "Pets / Pet shop",
        margem: 0.20,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 20% de margem bruta, como premissa intermediária para um segmento que combina venda de produtos e serviços.
        `,
        leituraSetorial: `
          No segmento pet, a operação costuma combinar produtos, serviços e recorrência. Isso tende a abrir espaço para uma margem mais equilibrada quando o preço está bem posicionado e o cliente percebe conveniência, confiança e continuidade no atendimento.
        `,
        atencaoSetorial: `
          O ponto de atenção é tratar todo o negócio como se tivesse a mesma lógica de margem. Em pet, produtos e serviços costumam ter comportamentos diferentes, e isso pode esconder oportunidade de captura melhor de resultado.
        `
      },
      agencia_consultoria: {
        nome: "Agência / Consultoria",
        margem: 0.30,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços intelectuais e de maior valor agregado.
        `,
        leituraSetorial: `
          Em agência e consultoria, o preço tende a refletir menos custo direto e mais especialização, confiança, repertório e valor percebido pelo cliente. Por isso, a qualidade da entrega e o posicionamento influenciam fortemente a margem possível.
        `,
        atencaoSetorial: `
          O risco mais comum é precificar só com base em horas, esforço ou custo interno, sem capturar adequadamente o valor gerado para o cliente. Isso pode limitar margem mesmo em operações com boa entrega.
        `
      },
      salao_estetica: {
        nome: "Salão de beleza / Estética",
        margem: 0.30,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 30% de margem bruta, como premissa conservadora para serviços de beleza e estética.
        `,
        leituraSetorial: `
          Em beleza e estética, a margem depende fortemente de percepção de qualidade, experiência entregue, recorrência e capacidade de fidelização. O preço costuma carregar mais do que o custo do procedimento em si.
        `,
        atencaoSetorial: `
          O principal risco é manter preços pressionados em um negócio que depende de agenda, experiência e relacionamento. Isso pode gerar ocupação, mas com captura limitada de valor por atendimento.
        `
      },
      industria: {
        nome: "Indústria",
        margem: 0.10,
        fonteHtml: `
          <strong>Referência utilizada:</strong> 10% de margem bruta, em leitura conservadora para o produto.
        `,
        leituraSetorial: `
          Em indústria, pequenas variações de margem por unidade podem ganhar grande relevância quando aplicadas em escala. Por isso, mesmo diferenças aparentemente pequenas de preço ou custo podem gerar impacto relevante no resultado total.
        `,
        atencaoSetorial: `
          O risco aqui é normalizar margens comprimidas por hábito operacional. Em negócios industriais, disciplina de margem é importante porque qualquer desvio tende a ser amplificado pelo volume.
        `
      }
    };

    function parseMoedaBR(valor) {
      if (!valor) return 0;
      const limpo = valor
        .replace(/[^\d,]/g, "")
        .replace(/\./g, "")
        .replace(",", ".");
      return Number(limpo) || 0;
    }

    function formatarMoedaInput(valor) {
      const numero = valor.replace(/\D/g, "");
      const centavos = (Number(numero) / 100) || 0;
      return centavos.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatarInteiroInput(valor) {
      const numero = valor.replace(/\D/g, "");
      return numero ? Number(numero).toLocaleString("pt-BR") : "";
    }

    function moedaSemCentavos(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }

    function moeda2Casas(valor) {
      return valor.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function percentualSemDecimal(valor) {
      return Math.round(valor * 100) + "%";
    }

    function classificarDiagnostico(margemAtual, margemReferencia, impactoSobreFaturamento) {
      const gap = margemReferencia - margemAtual;

      if (gap > 0.10 || impactoSobreFaturamento > 0.20) {
        return "critico";
      }
      if (gap > 0 || impactoSobreFaturamento > 0.10) {
        return "atencao";
      }
      if (margemAtual <= margemReferencia + 0.10) {
        return "saudavel";
      }
      return "acima";
    }

    function montarBadge(nivel) {
      const textos = {
        critico: "Diagnóstico crítico",
        atencao: "Diagnóstico de atenção",
        saudavel: "Diagnóstico saudável",
        acima: "Acima da referência"
      };

      return `
        <span class="badge ${nivel}">
          <span class="dot"></span>
          ${textos[nivel]}
        </span>
      `;
    }

    function montarContextoSetorial(referencia) {
      return `
        <div class="context-box">
          <h3 class="context-title">Contexto do seu segmento</h3>
          <p class="context-text">${referencia.leituraSetorial}</p>
          <p class="context-alert"><strong>Ponto de atenção:</strong> ${referencia.atencaoSetorial}</p>
          <div class="fonte">${referencia.fonteHtml}</div>
        </div>
      `;
    }

    const precoInput = document.getElementById("precoAtual");
    const custoInput = document.getElementById("custoUnitario");
    const volumeInput = document.getElementById("volume");

    precoInput.addEventListener("input", (e) => {
      e.target.value = formatarMoedaInput(e.target.value);
    });

    custoInput.addEventListener("input", (e) => {
      e.target.value = formatarMoedaInput(e.target.value);
    });

    volumeInput.addEventListener("input", (e) => {
      e.target.value = formatarInteiroInput(e.target.value);
    });

    function calcularDiagnostico() {
      const precoAtual = parseMoedaBR(precoInput.value);
      const custoUnitario = parseMoedaBR(custoInput.value);
      const volumeMensal = Number(volumeInput.value.replace(/\./g, "")) || 0;
      const segmentoKey = document.getElementById("segmento").value;

      const erro = document.getElementById("erro");
      const resultado = document.getElementById("resultado");

      erro.style.display = "none";
      resultado.style.display = "none";

      if (!precoAtual || !custoUnitario || !volumeMensal || !segmentoKey || precoAtual <= 0 || custoUnitario < 0) {
        erro.style.display = "block";
        return;
      }

      const referencia = referencias[segmentoKey];
      const faturamentoAtual = precoAtual * volumeMensal;
      const lucroAtualPorUnidade = precoAtual - custoUnitario;

      if (custoUnitario >= precoAtual) {
        const nivel = "critico";

        resultado.innerHTML = `
          <div class="hero">
            <div class="hero-main">
              ${montarBadge(nivel)}
              <h2 class="headline ${nivel}">Seu preço atual não cobre adequadamente o custo unitário.</h2>
              <p class="hero-text">
                Antes de comparar seu negócio com a referência do segmento, o primeiro ajuste precisa ser recuperar margem mínima sobre cada venda.
              </p>
            </div>

            <div class="hero-side">
              <div class="hero-side-label">Indicador principal</div>
              <div class="hero-side-value">${moeda2Casas(lucroAtualPorUnidade)}</div>
              <div class="hero-side-sub">Lucro bruto por unidade atual neste cenário.</div>
            </div>
          </div>

          <div class="compare-grid">
            <div class="compare-box">
              <h3 class="compare-title">Seu cenário atual</h3>
              <div class="compare-list">
                <div class="compare-row">
                  <div class="compare-name">Preço atual</div>
                  <div class="compare-value">${moeda2Casas(precoAtual)}</div>
                </div>
                <div class="compare-row">
                  <div class="compare-name">Custo por unidade</div>
                  <div class="compare-value">${moeda2Casas(custoUnitario)}</div>
                </div>
                <div class="compare-row">
                  <div class="compare-name">Lucro bruto por unidade atual</div>
                  <div class="compare-value">${moeda2Casas(lucroAtualPorUnidade)}</div>
                </div>
              </div>
            </div>

            <div class="compare-box">
              <h3 class="compare-title">Leitura rápida</h3>
              <div class="compare-list">
                <div class="compare-row">
                  <div class="compare-name">Status</div>
                  <div class="compare-value">Crítico</div>
                </div>
                <div class="compare-row">
                  <div class="compare-name">Prioridade</div>
                  <div class="compare-value">Rever preço</div>
                </div>
              </div>
            </div>
          </div>

          ${montarContextoSetorial(referencia)}

          <div class="disclaimer-box">
            <p class="disclaimer">
              <strong>Disclaimer:</strong> este diagnóstico é uma análise inicial, baseada exclusivamente nas informações preenchidas e em referências médias de mercado. Não considera custos fixos, regime tributário, mix de produtos ou serviços, concorrência local, descontos, canais de venda, sazonalidade, elasticidade de demanda, inadimplência, frete, comissões ou estratégia comercial. Os resultados devem ser interpretados como indicativos e não substituem uma análise financeira completa do negócio.
            </p>
          </div>
        `;
        resultado.style.display = "block";
        return;
      }

      const margemAtual = (precoAtual - custoUnitario) / precoAtual;
      const lucroBrutoAtual = (precoAtual - custoUnitario) * volumeMensal;

      const precoReferencia = custoUnitario / (1 - referencia.margem);
      const lucroBrutoReferencia = (precoReferencia - custoUnitario) * volumeMensal;
      const lucroReferenciaPorUnidade = precoReferencia - custoUnitario;

      const oportunidadeLucro = Math.max(0, lucroBrutoReferencia - lucroBrutoAtual);
      const anualizado = oportunidadeLucro * 12;
      const gapPrecoUnitario = Math.max(0, precoReferencia - precoAtual);
      const impactoSobreFaturamento = faturamentoAtual > 0 ? oportunidadeLucro / faturamentoAtual : 0;

      const nivel = classificarDiagnostico(
        margemAtual,
        referencia.margem,
        impactoSobreFaturamento
      );

      let titulo = "";
      let subtitulo = "";
      let destaque = "";
      let destaqueSub = "";

      if (nivel === "critico") {
        titulo = "Sua margem está muito abaixo da referência do seu segmento.";
        subtitulo = "Há forte indício de subprecificação, com impacto relevante na capacidade de captura de resultado da operação.";
        destaque = moedaSemCentavos(oportunidadeLucro);
        destaqueSub = "de oportunidade de lucro adicional por mês";
      } else if (nivel === "atencao") {
        titulo = "Sua margem está abaixo da referência do segmento, mas relativamente próxima.";
        subtitulo = "Seu preço atual já captura parte do valor da operação, mas ainda existe espaço concreto para melhorar a margem.";
        destaque = moedaSemCentavos(oportunidadeLucro);
        destaqueSub = "de oportunidade de lucro adicional por mês";
      } else if (nivel === "saudavel") {
        titulo = "Sua precificação está alinhada com a referência do seu segmento.";
        subtitulo = "Neste recorte, não há indicação clara de perda relevante de margem frente à referência utilizada.";
        destaque = percentualSemDecimal(margemAtual);
        destaqueSub = "de margem bruta atual";
      } else {
        titulo = "Sua margem está acima da referência do seu segmento.";
        subtitulo = "Seu preço atual indica uma captura de margem superior à referência usada para o segmento neste cenário.";
        destaque = percentualSemDecimal(margemAtual);
        destaqueSub = "de margem bruta atual";
      }

      let html = `
        <div class="hero">
          <div class="hero-main">
            ${montarBadge(nivel)}
            <h2 class="headline ${nivel}">${titulo}</h2>
            <p class="hero-text">${subtitulo}</p>
          </div>

          <div class="hero-side">
            <div class="hero-side-label">Indicador principal</div>
            <div class="hero-side-value">${destaque}</div>
            <div class="hero-side-sub">${destaqueSub}</div>
          </div>
        </div>
      `;

      if (nivel === "critico" || nivel === "atencao") {
        html += `
          <div class="metrics-grid">
            <div class="metric-card primary">
              <div class="metric-label">Oportunidade mensal</div>
              <div class="metric-value">${moedaSemCentavos(oportunidadeLucro)}</div>
              <div class="metric-desc">Margem adicional estimada que sua operação pode capturar por mês.</div>
            </div>

            <div class="metric-card warning">
              <div class="metric-label">Impacto no faturamento</div>
              <div class="metric-value">${percentualSemDecimal(impactoSobreFaturamento)}</div>
              <div class="metric-desc">Parcela estimada do faturamento atual que hoje não está sendo convertida em margem.</div>
            </div>

            <div class="metric-card info">
              <div class="metric-label">Gap por unidade</div>
              <div class="metric-value">${moeda2Casas(gapPrecoUnitario)}</div>
              <div class="metric-desc">Diferença estimada entre seu preço atual e o preço de referência do segmento.</div>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="metrics-grid">
            <div class="metric-card primary">
              <div class="metric-label">Margem atual</div>
              <div class="metric-value">${percentualSemDecimal(margemAtual)}</div>
              <div class="metric-desc">Margem bruta calculada com base no preço e custo informados.</div>
            </div>

            <div class="metric-card warning">
              <div class="metric-label">Lucro bruto mensal</div>
              <div class="metric-value">${moedaSemCentavos(lucroBrutoAtual)}</div>
              <div class="metric-desc">Resultado bruto mensal estimado com o volume atual informado.</div>
            </div>

            <div class="metric-card info">
              <div class="metric-label">Referência do segmento</div>
              <div class="metric-value">${percentualSemDecimal(referencia.margem)}</div>
              <div class="metric-desc">Margem usada como base comparativa para o segmento selecionado.</div>
            </div>
          </div>
        `;
      }

      html += `
        <div class="compare-grid">
          <div class="compare-box">
            <h3 class="compare-title">Seu cenário atual</h3>
            <div class="compare-list">
              <div class="compare-row">
                <div class="compare-name">Margem bruta atual</div>
                <div class="compare-value">${percentualSemDecimal(margemAtual)}</div>
              </div>
              <div class="compare-row">
                <div class="compare-name">Lucro/margem bruta atual</div>
                <div class="compare-value">${moedaSemCentavos(lucroBrutoAtual)}</div>
              </div>
              <div class="compare-row">
                <div class="compare-name">Lucro bruto por unidade atual</div>
                <div class="compare-value">${moeda2Casas(lucroAtualPorUnidade)}</div>
              </div>
              <div class="compare-row">
                <div class="compare-name">Preço atual</div>
                <div class="compare-value">${moeda2Casas(precoAtual)}</div>
              </div>
            </div>
          </div>

          <div class="compare-box">
            <h3 class="compare-title">Referência do segmento</h3>
            <div class="compare-list">
              <div class="compare-row">
                <div class="compare-name">Margem de referência</div>
                <div class="compare-value">${percentualSemDecimal(referencia.margem)}</div>
              </div>
              <div class="compare-row">
                <div class="compare-name">Lucro bruto por unidade na referência</div>
                <div class="compare-value">${moeda2Casas(lucroReferenciaPorUnidade)}</div>
              </div>
              <div class="compare-row">
                <div class="compare-name">Preço de referência estimado</div>
                <div class="compare-value">${moeda2Casas(precoReferencia)}</div>
              </div>
              ${nivel === "critico" || nivel === "atencao" ? `
              <div class="compare-row">
                <div class="compare-name">Potencial anual estimado</div>
                <div class="compare-value">${moedaSemCentavos(anualizado)}</div>
              </div>` : ""}
            </div>
          </div>
        </div>
      `;

      html += montarContextoSetorial(referencia);

      html += `
        <div class="disclaimer-box">
          <p class="disclaimer">
            <strong>Disclaimer:</strong> este diagnóstico é uma análise inicial, baseada exclusivamente nas informações preenchidas e em referências médias de mercado. Não considera custos fixos, regime tributário, mix de produtos ou serviços, concorrência local, descontos, canais de venda, sazonalidade, elasticidade de demanda, inadimplência, frete, comissões ou estratégia comercial. Os resultados devem ser interpretados como indicativos e não substituem uma análise financeira completa do negócio.
          </p>
        </div>
      `;

      resultado.innerHTML = html;
      resultado.style.display = "block";
    }
  </script>
</body>
</html>
